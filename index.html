    color:#000000;
    padding:6px 12px;
    font-size:12px;
    font-weight:600;
    border-radius:6px;
    max-width:65%;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.refresh-btn{
    position:absolute;
    top:8px;
    right:8px;
    background:#222;
    color:#fff;
    border:none;
    padding:6px 8px;
    border-radius:6px;
    cursor:pointer;
    font-size:13px;
    transition:0.2s;
}

.refresh-btn:hover{
    background:#ff2e63;
}

/* SPIN ANIMATION */
.spin{
    animation:spin 0.8s linear infinite;
}

@keyframes spin{
    from { transform:rotate(0deg); }
    to   { transform:rotate(360deg); }
}
.visit-btn{
    position:absolute;
    bottom:8px;
    right:8px;
    background:#ff2e63;
    color:#fff;
    padding:5px 10px;
    font-size:12px;
    border-radius:6px;
    text-decoration:none;
}

.card-loading{
    padding:40px;
    text-align:center;
    color:#888;
}

.offline-card{
    background:#111;
    padding:30px 20px;
    border-radius:8px;
    position:relative;
}        
        .visit-btn:hover{
            background:#fff;
            color:#000;
        }
        .delete-btn{
            position:absolute;
            top:8px;
            right:8px;
            z-index:10;
            color:#fff;
            cursor:pointer;
        }
        .modal-content{
            background:#000;
        }
        .footer{
            width:100%;
            text-align:center;
            padding:12px;
            font-size:13px;
            background:rgba(15,15,20,0.9);
            backdrop-filter:blur(6px);
            border-top:1px solid #222;
            color:#aaa;
        }
        .footer a{
            color:#ff2e63;
            text-decoration:none;
            font-weight:600;
        }
        .footer a:hover{
            color:#fff;
        }
        .custom-toast {
    background:#111;
    color:white;
    padding:12px 18px;
    margin-bottom:10px;
    border-radius:8px;
    min-width:220px;
    box-shadow:0 0 15px rgba(0,0,0,0.5);
    animation:slideIn .3s ease;
    font-size:14px;
}

.custom-toast.success { border-left:4px solid #28a745; }
.custom-toast.error { border-left:4px solid #dc3545; }

.custom-toast.hide {
    opacity:0;
    transform:translateX(50px);
    transition:all .5s;
}

@keyframes slideIn {
    from { opacity:0; transform:translateX(50px); }
    to { opacity:1; transform:translateX(0); }
}

.loading-btn {
    pointer-events:none;
    opacity:0.7;
}

.loading-btn i {
    animation:spin 1s linear infinite;
}

@keyframes spin {
    from { transform:rotate(0deg); }
    to { transform:rotate(360deg); }
}

<script>
    let activeStreams = new Set();
    let currentLimit = 8; // default
let currentColumns = 4;
function setGridMode(mode){

    const grid = document.getElementById("liveContainer");

    // reset class kolom
    grid.classList.remove("grid-2","grid-3","grid-4");

    switch(mode){

        case 2:
            currentColumns = 2;
            currentLimit = 2;
            grid.classList.add("grid-2");
        break;

        case 4:
            currentColumns = 2;
            currentLimit = 4;
            grid.classList.add("grid-2");
        break;

        case 8:
            currentColumns = 4;
            currentLimit = 8;
            grid.classList.add("grid-4");
        break;

        case 9:
            currentColumns = 3;
            currentLimit = 9;
            grid.classList.add("grid-3");
        break;

        case 16:
            currentColumns = 4;
            currentLimit = 16;
            grid.classList.add("grid-4");
        break;
    }

    enforceLimit();
}
function enforceLimit(){

    const grid = document.getElementById("liveContainer");
    const cards = Array.from(grid.querySelectorAll(".live-card"));

    if(cards.length <= currentLimit) return;

    // Hapus dari belakang
    for(let i = cards.length - 1; i >= currentLimit; i--){
        cards[i].remove();
    }
}
function showToast(message, type = "success") {

    const toast = document.createElement("div");

    toast.className = "custom-toast " + type;
    toast.innerText = message;

    document.getElementById("toastContainer").appendChild(toast);

    setTimeout(() => {
        toast.classList.add("hide");
        setTimeout(() => toast.remove(), 500);
    }, 3000);
}
async function loadStreamerList() {
    const container = document.getElementById("streamerList");
    container.innerHTML = "Loading...";

    try {
        const res = await fetch("channels.json");
        const data = await res.json();

        container.innerHTML = "";

        data.channels.forEach(channel => {

            const item = document.createElement("div");
            item.className = "d-flex justify-content-between align-items-center mb-2 p-2 bg-secondary rounded";

            item.innerHTML = `
    <span>${channel.name}</span>
    <button class="btn btn-sm btn-success"
        data-url="${channel.url}"
        onclick="addStreamerToGrid('${channel.url}', '${channel.name}', this)">
        Show Stream
    </button>
`;

            container.appendChild(item);
        });

    } catch (err) {
        container.innerHTML = "Gagal load streamer.";
    }
}
function updateStreamerButtons() {

    document.querySelectorAll("#streamerList button")
        .forEach(btn => {

            const url = btn.getAttribute("data-url");

            if (activeStreams.has(url)) {

                btn.classList.remove("btn-success");
                btn.classList.add("btn-secondary");
                btn.innerText = "Already Added";
                btn.disabled = true;

            } else {

                btn.classList.remove("btn-secondary");
                btn.classList.add("btn-success");
                btn.innerText = "Show Stream";
                btn.disabled = false;
            }
        });
}
function hideStream(button, url) {

    const card = button.closest(".live-card");
    if (card) card.remove();

    activeStreams.delete(url);

    showToast("Stream Removed", "success");

    updateStreamerButtons();
}
async function addStreamerToGrid(url, name, button) {

    if (!button) return;

    if (activeStreams.has(url)) {
        showToast("Streamer already added", "error");
        return;
    }

    button.classList.add("loading-btn");
    button.innerHTML = `<i class="fa fa-spinner"></i> Checking...`;

    try {

        const res = await fetch("https://arizuproject.my.id/nocturnnoir/check_live.php?url=" + encodeURIComponent(url));

        if (!res.ok) {
            throw new Error("HTTP status " + res.status);
        }

        const data = await res.json();

        console.log("Response:", data); // debug

        if (!data.live) {
            showToast("Stream Offline — Can't view stream", "error");
            resetButton(button);
            return;
        }

        if (!data.embed) {
            throw new Error("Embed URL missing");
        }

        const grid = document.getElementById("liveContainer");
        if (!grid) {
            console.error("liveContainer not found");
            return;
        }
        const card = document.createElement("div");
        card.className = "live-card";
        card.dataset.url = url;

        card.innerHTML = `
            <iframe class="live-frame"
                src="${data.embed}?autoplay=1&mute=1&rel=0"
                allow="autoplay; encrypted-media"
                allowfullscreen>
            </iframe>

            <div class="channel-name">${name}</div>

            <button class="hide-btn"
                onclick="hideStream(this, '${url}')">
                ✕
            </button>
        `;

        grid.prepend(card);

        activeStreams.add(url);

        showToast("Live Stream Added Successfully", "success");
            enforceLimit();
        updateStreamerButtons();

        bootstrap.Modal.getInstance(
            document.getElementById('streamerModal')
        ).hide();

    } catch (err) {

        console.error("Stream check error:", err);
        showToast("Error checking stream", "error");

    }

    resetButton(button);
}

function resetButton(button){
    button.classList.remove("loading-btn");
    button.innerHTML = "Show Stream";
}
document.getElementById("streamerModal")
.addEventListener("show.bs.modal", loadStreamerList);
function setGrid(col){
    liveGrid.style.gridTemplateColumns = `repeat(${col}, 1fr)`;

    document.querySelectorAll(".grid-control button")
        .forEach(btn=>btn.classList.remove("active"));

    event.target.classList.add("active");
}

const liveGrid = document.querySelector(".live-grid");

async function loadChannels() {
    liveGrid.innerHTML = "";

    const res = await fetch("channels.json");
    const data = await res.json();

    data.channels.forEach(channel => {
        renderCard(channel);
    });
}

function renderCard(channel) {

    const card = document.createElement("div");
    card.className = "live-card";
    card.dataset.url = channel.url;

    // Loading state awal
    card.innerHTML = `
        <div class="card-loading">
            Checking live status...
        </div>
    `;

    liveGrid.appendChild(card);

    checkChannelLive(channel, card);
}

async function checkChannelLive(channel, card) {

    try {
        const res = await fetch("https://arizuproject.my.id/nocturnnoir/check_live.php?url=" + encodeURIComponent(channel.url));
        const status = await res.json();
        if (status.live) {

            card.innerHTML = `
                <div class="live-wrapper">
                    <div class="video-wrapper">
                        <iframe class="live-frame"
                            src="${status.embed}?autoplay=1&mute=1&playsinline=1"
                            allow="autoplay; encrypted-media"
                            allowfullscreen>
                        </iframe>
                    </div>
                    <div class="live-badge">LIVE</div>

                    <div class="channel-name">${channel.name}</div>

                    <button class="refresh-btn">⟳</button>
                    <button class="hide-btn">✖</button>

                    <a href="${status.channel}"
                       target="_blank"
                       class="visit-btn">
                       Visit
                    </a>
                </div>
            `;

            liveGrid.prepend(card); // LIVE ke atas

        } else {

            card.innerHTML = `
                <div class="offline-card">
                    <div class="channel-name">${channel.name}</div>
                    <div class="offline-text">
                        Stream Offline
                    </div>
                    <button class="refresh-btn">⟳</button>
                    <button class="hide-btn">✖</button>
                    <a href="${status.channel}"
                    target="_blank"
                    class="visit-btn">
                    Visit
                    </a>
                </div>
            `;

            liveGrid.appendChild(card);
        }

        // Event refresh khusus card ini
        card.querySelector(".refresh-btn").addEventListener("click", (e) => {

            const btn = e.target;
            btn.classList.add("spin");

            checkChannelLive(channel, card).then(() => {
                btn.classList.remove("spin");
            });

        });
        card.querySelector(".hide-btn").addEventListener("click", () => {
            card.remove();
        });

    } catch (err) {
        card.innerHTML = `<div class="offline-card">Error loading</div>`;
    }
}

loadChannels();
setGridMode(16);
</script>
